<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700;900&family=Crimson+Text:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
@page { size: letter; margin: 0; }
html, body { margin: 0; padding: 0; background: #f4efe4; }

.sheet {
  width: 8.5in;
  height: 11in;
  display: grid;
  grid-template-columns: 2.5in 2.5in 2.5in;
  grid-template-rows: 4in 4in;
  column-gap: 0;
  row-gap: 0;
  align-content: center;
  justify-content: center;
  background: #f4efe4;
  page-break-after: always;
  position: relative;
}
.sheet:last-child { page-break-after: avoid; }

/* Cut guides */
.cut-v1 {
  position: absolute;
  left: calc((8.5in - 7.5in) / 2 + 2.5in);
  top: 0.15in; bottom: 0.15in;
  width: 0.5px;
  background: repeating-linear-gradient(to bottom, rgba(26,18,8,0.25) 0px, rgba(26,18,8,0.25) 4px, transparent 4px, transparent 8px);
  pointer-events: none;
}
.cut-v2 {
  position: absolute;
  left: calc((8.5in - 7.5in) / 2 + 5in);
  top: 0.15in; bottom: 0.15in;
  width: 0.5px;
  background: repeating-linear-gradient(to bottom, rgba(26,18,8,0.25) 0px, rgba(26,18,8,0.25) 4px, transparent 4px, transparent 8px);
  pointer-events: none;
}
.cut-h1 { position: absolute; left: 0.15in; right: 0.15in; height: 0.5px; background: repeating-linear-gradient(to right, rgba(26,18,8,0.25) 0px, rgba(26,18,8,0.25) 4px, transparent 4px, transparent 8px); pointer-events: none; top: calc((11in - 8in) / 2 + 4in); }
.cut-h2 { display: none; }
.cut-h3 { display: none; }

.card {
  width: 2.5in;
  height: 4in;
  overflow: hidden;
  position: relative;
  background: #f4efe4;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 0.16in 0.14in;
  gap: 0.05in;
}

.border-outer { position: absolute; inset: 6px; border: 0.75px solid rgba(26,18,8,0.28); pointer-events: none; }
.selah-glow { position: absolute; top: 25%; left: 50%; transform: translate(-50%,-50%); width: 2in; height: 0.9in; background: radial-gradient(ellipse, rgba(110,28,28,0.18) 0%, rgba(110,28,28,0.07) 40%, transparent 70%); pointer-events: none; z-index: 0; }
.wordmark { position: relative; z-index: 1; font-family: 'Cinzel', serif; font-size: 30px; font-weight: 900; letter-spacing: 0.2em; color: #1a1208; text-align: center; line-height: 1; }
.tagline { font-family: 'Crimson Text', serif; font-style: italic; font-size: 9.5px; color: #4a3a18; letter-spacing: 0.06em; text-align: center; }
.rule { width: 88%; display: flex; align-items: center; gap: 6px; }
.rule-line { flex: 1; height: 0.5px; background: linear-gradient(to right, transparent, #a8832a, transparent); }
.rule-dot { width: 3px; height: 3px; background: #a8832a; transform: rotate(45deg); flex-shrink: 0; opacity: 0.75; }
.body-text { font-family: 'Crimson Text', serif; font-size: 10px; line-height: 1.6; color: #2e2410; text-align: center; padding: 0 6px; }
.qr-block { display: flex; flex-direction: column; align-items: center; gap: 2px; }
.qr-label { font-family: 'Cinzel', serif; font-size: 6.5px; color: #2e2410; letter-spacing: 0.12em; text-transform: uppercase; text-align: center; }
.url-text { font-family: 'Cinzel', serif; font-size: 7.5px; color: #1a1208; letter-spacing: 0.08em; text-align: center; text-transform: lowercase; border-bottom: 0.5px solid rgba(168,131,42,0.4); padding-bottom: 1px; }
.footer-mark { font-family: 'Cinzel', serif; font-size: 7.5px; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase; color: #1a1208; }

/* BACK */
.back-header { width: 100%; display: flex; align-items: center; gap: 8px; margin-bottom: 0.03in; }
.back-cross { flex-shrink: 0; }
.back-cross svg { display: block; }
.back-title-wrap { flex: 1; text-align: center; padding-right: 22px; }
.back-title { font-family: 'Cinzel', serif; font-size: 8.5px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: #1a1208; }
.back-sub { font-family: 'Crimson Text', serif; font-style: italic; font-size: 8.5px; color: #5a4a20; line-height: 1.4; }
.steps { width: 100%; display: flex; flex-direction: column; gap: 0.045in; }
.step { display: flex; align-items: flex-start; gap: 7px; }
.step-num { font-family: 'Cinzel', serif; font-size: 9.5px; font-weight: 700; color: #a8832a; flex-shrink: 0; width: 14px; text-align: right; }
.step-body { flex: 1; }
.step-title { font-family: 'Cinzel', serif; font-size: 7px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #1a1208; }
.step-desc { font-family: 'Crimson Text', serif; font-size: 8.5px; color: #3a2e14; line-height: 1.4; }
.donate-row { width: 100%; display: flex; align-items: center; gap: 8px; border-top: 0.5px solid rgba(26,18,8,0.16); padding-top: 0.05in; }
.donate-text { flex: 1; }
.donate-title { font-family: 'Cinzel', serif; font-size: 7px; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: #1a1208; margin-bottom: 2px; }
.donate-desc { font-family: 'Crimson Text', serif; font-style: italic; font-size: 8.5px; color: #5a4a20; line-height: 1.4; }

@media print { * { -webkit-print-color-adjust: exact; print-color-adjust: exact; } }
</style>
</head>

<script>
function buildQR(id, url, size) {
  const el = document.getElementById(id);
  if (!el) return;
  const hidden = document.createElement('div');
  hidden.style.cssText = 'position:absolute;left:-9999px;';
  document.body.appendChild(hidden);
  new QRCode(hidden, { text: url, width: size, height: size, colorDark: "#000000", colorLight: "#ffffff", correctLevel: QRCode.CorrectLevel.H });
  setTimeout(() => {
    const src = hidden.querySelector('canvas');
    if (!src) return;
    const W = src.width, H = src.height;
    const sd = src.getContext('2d').getImageData(0,0,W,H);
    const out = document.createElement('canvas');
    out.width = W; out.height = H;
    const ctx = out.getContext('2d');
    const od = ctx.createImageData(W,H);
    for (let i = 0; i < sd.data.length; i+=4) {
      if (sd.data[i] < 64) { od.data[i]=110; od.data[i+1]=28; od.data[i+2]=28; od.data[i+3]=255; }
      else { od.data[i]=244; od.data[i+1]=239; od.data[i+2]=228; od.data[i+3]=0; }
    }
    ctx.putImageData(od, 0, 0);
    out.style.display = 'block';
    el.appendChild(out);
    document.body.removeChild(hidden);
  }, 300);
}

window.addEventListener('load', () => {
  ['qf1','qf2','qf3','qf4','qf5','qf6'].forEach(id =>
    buildQR(id, 'https://selah-midnight.netlify.app', 58));
  ['qb1','qb2','qb3','qb4','qb5','qb6'].forEach(id =>
    buildQR(id, 'https://donate.midnightministries.com', 46));
});
</script>
