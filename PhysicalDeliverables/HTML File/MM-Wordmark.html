<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { background:#0e0c06; display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:100vh; gap:20px; }
.label { font-family:'Cinzel',serif; font-size:9px; letter-spacing:0.16em; text-transform:uppercase; color:#4a3a18; }
canvas { max-width:100%; }
.btn { background:#6e1c1c; color:#f2ece0; border:none; border-radius:3px; padding:10px 28px; font-size:10px; letter-spacing:0.1em; text-transform:uppercase; cursor:pointer; }
</style>
</head>
<body>
<div class="label">Midnight Ministries Wordmark</div>
<canvas id="mm" width="1800" height="200" style="max-width:90vw;"></canvas>
<button class="btn" onclick="dl()">Download Wordmark PNG</button>
<script>
document.fonts.ready.then(() => {
  const c = document.getElementById('mm');
  const ctx = c.getContext('2d');
  ctx.clearRect(0,0,1800,200);
  ctx.font = '700 90px "Cinzel", serif';
  ctx.fillStyle = '#c8bfa0';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = 'rgba(201,168,76,0.5)';
  ctx.shadowBlur = 24;
  ctx.fillText('MIDNIGHT MINISTRIES', 900, 100);
  ctx.shadowBlur = 0;
});
function dl() {
  const a = document.createElement('a');
  a.download = 'MM_Wordmark.png';
  a.href = document.getElementById('mm').toDataURL('image/png');
  a.click();
}
</script>
</body>
</html>
