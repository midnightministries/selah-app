<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@900&display=swap" rel="stylesheet">
<style>
* { box-sizing:border-box; margin:0; padding:0; }
body { background:#ffffff; display:flex; align-items:center; justify-content:center; min-height:100vh; }
img { max-width:90vw; display:block; }
</style>
</head>
<body>
<div id="wrap"></div>
<canvas id="c" width="1200" height="280" style="display:none;"></canvas>
<script>
document.fonts.ready.then(() => {
  const c = document.getElementById('c');
  const ctx = c.getContext('2d');
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0,0,1200,280);
  ctx.font = '900 200px "Cinzel", serif';
  ctx.fillStyle = '#6e1c1c';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.shadowColor = 'rgba(110,28,28,0.5)';
  ctx.shadowBlur = 24;
  ctx.fillText('SELAH', 600, 140);
  ctx.shadowBlur = 0;
  const img = document.createElement('img');
  img.src = c.toDataURL('image/png');
  img.style.maxWidth = '90vw';
  document.getElementById('wrap').appendChild(img);
});
</script>
</body>
</html>
